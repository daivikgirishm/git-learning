<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Login</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #4C6EF5, #6BCBFF);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #ffffff;
            padding: 40px 35px;
            border-radius: 16px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.8s ease;
        }

        .title {
            text-align: center;
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 700;
            color: #3A3A3A;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d6d6d6;
            border-radius: 10px;
            margin-top: 6px;
            font-size: 14px;
        }

        .input-group input:focus {
            border-color: #4C6EF5;
            outline: none;
            box-shadow: 0 0 4px rgba(76, 110, 245, 0.4);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #4C6EF5;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s ease;
        }

        .login-btn:hover {
            background: #3B5BDB;
        }

        .link {
            text-align: center;
            margin-top: 12px;
            color: #4C6EF5;
            font-size: 14px;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: scale(1); 
            }
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="title">CRM Login</div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password">
        </div>

        <button class="login-btn">Login</button>

        <div class="link">Forgot Password?</div>
    </div>

</body>
</html>
