<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Login</title>

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #4C6EF5, #6BCBFF);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .login-box {
        background: #fff;
        padding: 40px;
        width: 350px;
        border-radius: 16px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        animation: fadeIn 0.8s ease;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    .input-group {
        margin-bottom: 18px;
    }

    .input-group label {
        font-size: 15px;
        font-weight: 600;
        color: #444;
    }

    .input-group input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        margin-top: 6px;
        font-size: 14px;
    }

    .input-group input:focus {
        outline: none;
        border-color: #4C6EF5;
        box-shadow: 0 0 4px rgba(76,110,245,0.4);
    }

    button {
        width: 100%;
        padding: 12px;
        background: #4C6EF5;
        border: none;
        border-radius: 10px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        font-weight: 600;
    }

    button:hover {
        background: #3B5BDB;
    }

    .msg {
        margin-top: 12px;
        text-align: center;
        font-size: 14px;
        font-weight: bold;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: scale(0.95);}
        to {opacity: 1; transform: scale(1);}
    }
</style>
</head>

<body>

<div class="login-box">
    <h2>CRM Login</h2>

    <div class="input-group">
        <label>Email</label>
        <input id="email" type="email" placeholder="Enter email" required>
    </div>

    <div class="input-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter password" required>
    </div>

    <button onclick="login()">Login</button>

    <div id="message" class="msg"></div>
</div>

<script>
    function login() {
        let email = document.getElementById("email").value.trim();
        let password = document.getElementById("password").value.trim();
        let msg = document.getElementById("message");

        // Hardcoded working login (you can change)
        const USER = "admin@crm.com";
        const PASS = "admin123";

        if (email === USER && password === PASS) {
            msg.style.color = "green";
            msg.innerHTML = "Login Successful! 🎉 Redirecting...";

            setTimeout(() => {
                document.body.innerHTML = 
                    "<h1 style='text-align:center;margin-top:20%;font-family:Segoe UI'>Welcome to CRM Dashboard 🎯</h1>";
            }, 1500);

        } else {
            msg.style.color = "red";
            msg.innerHTML = "Invalid Credentials ❌";
        }
    }
</script>

</body>
</html>
